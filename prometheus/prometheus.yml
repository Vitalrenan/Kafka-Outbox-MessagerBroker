global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'python-metrics'
    static_configs:
      - targets: ['host.docker.internal:8001']

  - job_name: 'consumer'
    static_configs:
      - targets: ['host.docker.internal:8001']

  - job_name: 'worker'
    static_configs:
      - targets: ['host.docker.internal:8002']

  - job_name: 'api'
    static_configs:
      - targets: ['host.docker.internal:8003']